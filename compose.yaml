services:
  website:
    build: .
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:-asphoto-dev-secret-change-in-prod}
      - NODE_ENV=production
    volumes:
      - /srv/active-raid/LIBRARIES/247/photosite/uploads:/app/uploads
      - /srv/active-raid/LIBRARIES/247/photosite/assets:/app/public/assets
      - ./server/users.json:/app/server/users.json
    networks:
      web:
        aliases:
          - asphoto

networks:
  web:
    external: true
    name: caddy_web
