<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="AS Photo Upload">
    <title>Upload - AS Photo</title>
    <link rel="icon" type="image/jpeg" href="https://photos.smugmug.com/ALEC-SAVOYE/All-New-Film/SLOfinale/i-87vczWq/0/L8SH7HJWRMWxKMPZ5sskHhvTKdH3MkDDMPtfLkqSJ/L/clintlydONE_002-L.jpg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card upload-card">
        <h1 class="auth-title">Upload Photos</h1>
        <p class="auth-subtitle" id="user-greeting"></p>
        <form id="upload-form" class="upload-form" enctype="multipart/form-data">
          <div id="upload-items"></div>
          <div class="upload-add-row">
            <button type="button" id="add-photo-btn" class="auth-submit small">Add Photo</button>
          </div>
          <div id="upload-error" class="auth-error"></div>
          <div id="upload-success" class="auth-success"></div>
          <button type="submit" class="auth-submit">Upload All</button>
        </form>
        <form id="logout-form" class="logout-form" action="/api/logout" method="POST">
          <button type="submit" class="auth-back">Logout</button>
        </form>
        <a href="/" class="auth-back">Back to site</a>
      </div>
    </div>

    <script>
      (function () {
        fetch("/api/me")
          .then(function (r) {
            if (!r.ok) {
              window.location.href = "/login";
              throw new Error("not authed");
            }
            return r.json();
          })
          .then(function (data) {
            document.getElementById("user-greeting").textContent = "Signed in as " + data.username;
          })
          .catch(function () {});

        var items = document.getElementById("upload-items");
        var addBtn = document.getElementById("add-photo-btn");
        var error = document.getElementById("upload-error");
        var success = document.getElementById("upload-success");

        function addItem() {
          var row = document.createElement("div");
          row.className = "upload-item";

          var fileInput = document.createElement("input");
          fileInput.type = "file";
          fileInput.name = "photos";
          fileInput.accept = "image/*";
          fileInput.required = true;

          var nameInput = document.createElement("input");
          nameInput.type = "text";
          nameInput.name = "names";
          nameInput.placeholder = "Photo name";
          nameInput.required = true;

          var removeBtn = document.createElement("button");
          removeBtn.type = "button";
          removeBtn.className = "upload-remove";
          removeBtn.textContent = "\u00d7";
          removeBtn.addEventListener("click", function () {
            row.remove();
          });

          row.appendChild(fileInput);
          row.appendChild(nameInput);
          row.appendChild(removeBtn);
          items.appendChild(row);
        }

        addItem();
        addBtn.addEventListener("click", addItem);

        document.getElementById("upload-form").addEventListener("submit", function (e) {
          e.preventDefault();
          error.textContent = "";
          success.innerHTML = 'Uploading <div class="upload-progress-wrap"><div class="upload-progress-bar" id="progress-bar"></div></div>';

          var fd = new FormData(e.target);
          var xhr = new XMLHttpRequest();
          var bar = document.getElementById("progress-bar");

          xhr.open("POST", "/api/upload", true);
          xhr.withCredentials = true;
          xhr.responseType = "text";

          xhr.upload.addEventListener("progress", function (ev) {
            if (ev.lengthComputable) {
              var pct = Math.round((ev.loaded / ev.total) * 100);
              bar.style.width = pct + "%";
            }
          });

          xhr.addEventListener("load", function () {
            var d;
            try { d = JSON.parse(xhr.responseText); } catch (parseErr) {
              error.textContent = "HTTP " + xhr.status + ": " + xhr.responseText.slice(0, 500);
              success.textContent = "";
              return;
            }
            if (xhr.status >= 400) {
              error.textContent = "HTTP " + xhr.status + ": " + (d.error || xhr.responseText.slice(0, 500));
              success.textContent = "";
              return;
            }
            success.textContent = d.files.length + " file(s) uploaded successfully";
            items.innerHTML = "";
            addItem();
          });

          xhr.addEventListener("error", function () {
            error.textContent = "Network error: request failed (CORS, timeout, or server unreachable)";
            success.textContent = "";
          });

          xhr.addEventListener("timeout", function () {
            error.textContent = "Upload timed out";
            success.textContent = "";
          });

          xhr.send(fd);
        });

        document.getElementById("logout-form").addEventListener("submit", function (e) {
          e.preventDefault();
          fetch("/api/logout", { method: "POST" })
            .then(function () {
              window.location.href = "/login";
            });
        });
      })();
    </script>
  </body>
</html>
