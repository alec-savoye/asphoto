<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Music - AS Photo</title>
    <link rel="icon" type="image/jpeg" href="https://photos.smugmug.com/ALEC-SAVOYE/All-New-Film/SLOfinale/i-87vczWq/0/L8SH7HJWRMWxKMPZ5sskHhvTKdH3MkDDMPtfLkqSJ/L/clintlydONE_002-L.jpg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="music-page" id="music-page">
      <div class="music-header">
        <h1 class="music-title">Music</h1>
        <a href="/" class="music-back">Back</a>
      </div>

      <div id="music-gate" class="music-gate">
        <form id="music-auth-form" class="music-auth-form">
          <div class="auth-field">
            <label for="music-password">Password</label>
            <input type="password" id="music-password" name="password" autocomplete="off" required>
          </div>
          <div id="music-auth-error" class="auth-error"></div>
          <button type="submit" class="auth-submit">Enter</button>
        </form>
      </div>

      <div class="music-content hidden" id="music-content">
        <img class="music-image" id="music-image" src="/assets/clintoncityhap_005.jpg" alt="">
        <div class="music-list-wrap" id="music-list-wrap">
          <div id="music-status" class="music-status">Loading library...</div>
          <div id="music-list" class="music-list"></div>
        </div>
      </div>

      <div id="music-player" class="music-player hidden">
        <div class="music-player-info">
          <span id="player-title" class="player-title"></span>
          <span id="player-artist" class="player-artist"></span>
        </div>
        <div class="player-controls">
          <button id="player-prev" class="player-btn" aria-label="Previous">&#9664;&#9664;</button>
          <button id="player-play" class="player-btn play-btn" aria-label="Play">&#9654;</button>
          <button id="player-next" class="player-btn" aria-label="Next">&#9654;&#9654;</button>
          <a id="player-download" class="player-btn download-btn" href="#" aria-label="Download album">&#8681;</a>
        </div>
        <div class="player-progress-wrap">
          <span id="player-current" class="player-time">0:00</span>
          <div class="player-progress-bar" id="progress-bar">
            <div class="player-progress-fill" id="progress-fill"></div>
          </div>
          <span id="player-duration" class="player-time">0:00</span>
        </div>
      </div>
    </div>
    <audio id="audio" preload="metadata"></audio>

    <script>
      (function () {
        var tracks = [];
        var currentTrack = -1;
        var audio = document.getElementById("audio");
        var status = document.getElementById("music-status");
        var list = document.getElementById("music-list");
        var player = document.getElementById("music-player");
        var playBtn = document.getElementById("player-play");
        var prevBtn = document.getElementById("player-prev");
        var nextBtn = document.getElementById("player-next");
        var downloadBtn = document.getElementById("player-download");
        var progressFill = document.getElementById("progress-fill");
        var progressBar = document.getElementById("progress-bar");
        var currentTime = document.getElementById("player-current");
        var durationEl = document.getElementById("player-duration");
        var musicPage = document.getElementById("music-page");

        function formatTime(s) {
          if (!s || isNaN(s)) return "0:00";
          var m = Math.floor(s / 60);
          var sec = Math.floor(s % 60);
          return m + ":" + (sec < 10 ? "0" : "") + sec;
        }

        var gate = document.getElementById("music-gate");
        var authForm = document.getElementById("music-auth-form");
        var authError = document.getElementById("music-auth-error");
        var musicContent = document.getElementById("music-content");

        function checkMusicAuth() {
          fetch("/api/music", { credentials: "same-origin" })
            .then(function (r) {
              if (r.status === 401) {
                gate.style.display = "";
                musicContent.classList.add("hidden");
              } else {
                gate.style.display = "none";
                musicContent.classList.remove("hidden");
                loadMusic();
              }
            })
            .catch(function () {
              gate.style.display = "";
              musicContent.classList.add("hidden");
            });
        }

        authForm.addEventListener("submit", function (e) {
          e.preventDefault();
          authError.textContent = "";
          var pw = document.getElementById("music-password").value;
          fetch("/api/music/auth", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw }),
            credentials: "same-origin"
          })
            .then(function (r) {
              return r.json().then(function (d) {
                if (!r.ok) throw new Error(d.error || "Auth failed");
                return d;
              });
            })
            .then(function () {
              gate.style.display = "none";
              musicContent.classList.remove("hidden");
              loadMusic();
            })
            .catch(function (err) {
              authError.textContent = err.message;
            });
        });

        checkMusicAuth();

        function playTrack(index) {
          if (index < 0 || index >= tracks.length) return;
          currentTrack = index;
          var t = tracks[index];
          document.getElementById("player-title").textContent = t.title;
          document.getElementById("player-artist").textContent = t.artist + (t.album ? " \u2014 " + t.album : "");
          durationEl.textContent = formatTime(t.duration);
          player.classList.remove("hidden");
          status.textContent = "Loading: " + t.title + "...";

          if (t.album) {
            downloadBtn.href = "/api/music/download/" + encodeURIComponent(t.album);
            downloadBtn.style.display = "";
          } else {
            downloadBtn.style.display = "none";
          }

          document.querySelectorAll(".music-track").forEach(function (el, i) {
            el.classList.toggle("active", i === index);
          });

          audio.pause();
          audio.src = "/api/music/stream?path=" + encodeURIComponent(t.path) + "&transcode=1";

          audio.oncanplay = function () {
            status.textContent = "";
            audio.play().then(function () {
              playBtn.innerHTML = "&#9646;&#9646;";
              musicPage.classList.add("playing");
            }).catch(function (e) {
              playBtn.innerHTML = "&#9654;";
              status.textContent = "Play error: " + e.message;
            });
            audio.oncanplay = null;
          };

          audio.onerror = function () {
            var errMsg = "Error loading audio";
            if (audio.error) {
              var codes = { 1: "ABORTED", 2: "NETWORK", 3: "DECODE", 4: "SRC_NOT_SUPPORTED" };
              errMsg = "Audio error " + (codes[audio.error.code] || audio.error.code) + ": " + (audio.error.message || "");
              errMsg += " | src: " + audio.src.slice(0, 120);
            }
            status.textContent = errMsg;
            playBtn.innerHTML = "&#9654;";
            audio.onerror = null;
          };
        }

        playBtn.addEventListener("click", function () {
          if (audio.paused) {
            audio.play();
            playBtn.innerHTML = "&#9646;&#9646;";
            musicPage.classList.add("playing");
          } else {
            audio.pause();
            playBtn.innerHTML = "&#9654;";
            musicPage.classList.remove("playing");
          }
        });

        nextBtn.addEventListener("click", function () {
          playTrack((currentTrack + 1) % tracks.length);
        });

        prevBtn.addEventListener("click", function () {
          playTrack(currentTrack - 1 < 0 ? tracks.length - 1 : currentTrack - 1);
        });

        audio.addEventListener("timeupdate", function () {
          if (audio.duration) {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + "%";
            currentTime.textContent = formatTime(audio.currentTime);
          }
        });

        audio.addEventListener("ended", function () {
          if (currentTrack < tracks.length - 1) {
            playTrack(currentTrack + 1);
          } else {
            playBtn.innerHTML = "&#9654;";
            progressFill.style.width = "0%";
            musicPage.classList.remove("playing");
          }
        });

        progressBar.addEventListener("click", function (e) {
          if (audio.duration) {
            var rect = progressBar.getBoundingClientRect();
            var pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
          }
        });

        function loadMusic() {
          fetch("/api/music", { credentials: "same-origin" })
            .then(function (r) {
              if (!r.ok) {
                return r.text().then(function (text) {
                  throw new Error("HTTP " + r.status + ": " + text.slice(0, 500));
                });
              }
              return r.json();
            })
            .then(function (data) {
              if (data.status === "indexing") {
                status.textContent = "Indexing library... " + data.progress + " / " + data.total + " tracks parsed";
                setTimeout(loadMusic, 2000);
                return;
              }

              tracks = data;
              status.textContent = "Loaded " + data.length + " tracks";
              setTimeout(function () { status.textContent = ""; }, 2000);

              if (data.length === 0) {
                status.textContent = "No music files found";
                return;
              }

              var currentAlbum = "";
              data.forEach(function (t, i) {
                var albumLabel = t.album || "\u2014 Unknown Album \u2014";
                if (albumLabel !== currentAlbum) {
                  currentAlbum = albumLabel;
                  var header = document.createElement("div");
                  header.className = "music-album-header";
                  var headerText = albumLabel + (t.artist ? " \u2014 " + t.artist : "") + (t.year ? " (" + t.year + ")" : "");
                  header.innerHTML = '<span>' + headerText + '</span>' +
                    '<a class="album-download" href="/api/music/download/' + encodeURIComponent(t.album || "") + '" title="Download album">&#8681;</a>';
                  list.appendChild(header);
                }

                var row = document.createElement("div");
                row.className = "music-track";
                row.innerHTML =
                  '<span class="track-num">' + (t.track || "") + '</span>' +
                  '<span class="track-title">' + t.title + '</span>' +
                  '<span class="track-duration">' + formatTime(t.duration) + '</span>';
                row.addEventListener("click", function () { playTrack(i); });
                list.appendChild(row);
              });
            })
            .catch(function (err) {
              status.textContent = "Error: " + err.message;
            });
        }
      })();
    </script>
  </body>
</html>
