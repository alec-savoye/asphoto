<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Alec Savoye Photography">
    <title>AS Photo</title>
    <link rel="icon" type="image/jpeg" href="https://photos.smugmug.com/ALEC-SAVOYE/All-New-Film/SLOfinale/i-87vczWq/0/L8SH7HJWRMWxKMPZ5sskHhvTKdH3MkDDMPtfLkqSJ/L/clintlydONE_002-L.jpg">
    <link rel="stylesheet" href="styles.css?v=2">
  </head>
  <body>
    <div id="landing">
      <img id="landing-img" src="assets/DULUTHSUP_025_preview.jpeg" alt="">
      <div id="landing-overlay">
        <a href="#" id="enter-btn" class="landing-btn">Enter Prototype</a>
        <a href="https://fa.alecsavoye.com/" id="family-btn" class="landing-btn">Family Archive</a>
        <a href="/login" id="upload-btn" class="landing-btn">Upload</a>
        <a href="/music" id="music-btn" class="landing-btn">Music</a>
        <a href="/about" id="about-btn" class="landing-btn">About</a>
      </div>
    </div>

    <footer id="landing-footer">
      <a href="/about" class="footer-link">About</a>
    </footer>

    <header id="site-header" class="hidden">
      <a href="#" id="logo">AS Photo</a>
      <nav id="main-nav">
        <a href="#" class="nav-link active" data-gallery="Selection">Selection</a>
        <a href="#" class="nav-link" data-gallery="Endless-Summer">Endless Summer</a>
        <a href="#" class="nav-link" data-gallery="Indifferent">Indifferent</a>
        <a href="#" class="nav-link" data-gallery="After-Shabang">After Shabang</a>
        <a href="#" class="nav-link" data-gallery="All-New-Film">Film</a>
        <a href="#" class="nav-link" data-gallery="User-Uploads">User Uploads</a>
      </nav>
      <div id="header-links">
        <a href="https://alecsavoyephotography.smugmug.com" target="_blank" rel="noopener" class="external-link">SmugMug</a>
      </div>
    </header>

    <main id="gallery-view" class="hidden">
      <div id="gallery-hero">
        <h1 id="gallery-title"></h1>
        <p id="gallery-description"></p>
        <span id="gallery-count"></span>
      </div>
      <div id="gallery-grid"></div>
      <div id="film-albums" class="hidden">
        <h2>Albums</h2>
        <div id="album-list"></div>
      </div>
    </main>

    <div id="lightbox" class="hidden">
      <button id="lb-close" aria-label="Close">&times;</button>
      <button id="lb-prev" aria-label="Previous">&#8249;</button>
      <button id="lb-next" aria-label="Next">&#8250;</button>
      <div id="lb-image-wrap">
        <img id="lb-image" src="" alt="">
      </div>
      <div id="lb-info">
        <span id="lb-title"></span>
        <span id="lb-caption"></span>
        <span id="lb-counter"></span>
      </div>
    </div>

    <div id="uploads-view" class="hidden">
      <div id="uploads-back">Back</div>
      <img id="uploads-image" src="" alt="">
      <span id="uploads-title"></span>
      <span id="uploads-counter"></span>
    </div>

    <script src="gallery-data.js"></script>
    <script src="gallery.js"></script>
  </body>
</html>
